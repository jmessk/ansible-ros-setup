# Installation guide:
# https://docs.ros.org/en/jazzy/Installation/Ubuntu-Install-Debs.html

---

# Validate Ubuntu release

- name: Validate Ubuntu release for ROS 2 Jazzy
  ansible.builtin.assert:
    that:
      - ansible_facts["distribution"] == "Ubuntu"
      - ansible_facts["distribution_release"] == "noble"
    fail_msg: ROS 2 Jazzy deb packages are supported only on Ubuntu Noble (24.04).
    quiet: true

# Set locale

# sudo apt update && sudo apt install locales
- name: Install locale prerequisites
  ansible.builtin.apt:
    name: locales
    state: present
    update_cache: yes

# sudo locale-gen en_US en_US.UTF-8
- name: Generate locale
  ansible.builtin.command: locale-gen en_US.UTF-8
  args:
    creates: /usr/lib/locale/en_US.utf8
  changed_when: false

# sudo update-locale LC_ALL=en_US.UTF-8 LANG=en_US.UTF-8
- name: Set default locale
  ansible.builtin.command: update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
  changed_when: false

# export ROS_APT_SOURCE_VERSION=$(curl -s https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest | grep -F "tag_name" | awk -F'"' '{print $4}')
- name: Get latest ROS 2 apt source release
  ansible.builtin.uri:
    url: https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest
    return_content: yes
  register: ros_release

- name: Set release version fact
  ansible.builtin.set_fact:
    ros_apt_source_version: "{{ ros_release.json.tag_name }}"

# curl -L -o /tmp/ros2-apt-source.deb "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.$(. /etc/os-release && echo ${UBUNTU_CODENAME:-${VERSION_CODENAME}})_all.deb"
- name: Download ROS 2 apt source package
  ansible.builtin.get_url:
    url: https://github.com/ros-infrastructure/ros-apt-source/releases/download/{{ ros_apt_source_version }}/ros2-apt-source_{{ ros_apt_source_version }}.{{ ansible_facts["distribution_release"] }}_all.deb
    dest: /tmp/ros2-apt-source.deb

# sudo dpkg -i /tmp/ros2-apt-source.deb
- name: Install ROS 2 apt source package
  ansible.builtin.apt:
    deb: /tmp/ros2-apt-source.deb
    state: present

# Install development tools (optional)

# sudo apt update && sudo apt install ros-dev-tools
- name: Install ROS development tools
  ansible.builtin.apt:
    name: ros-dev-tools
    state: present
    update_cache: yes
  when: ros_install_dev_tools | bool

# Install ROS 2

# sudo apt install ros-jazzy-desktop
# or
# sudo apt install ros-jazzy-ros-base
- name: Install selected ROS 2 metapackage
  ansible.builtin.apt:
    name: "{{ ros_package }}"
    state: present
    update_cache: yes

# Setup environment

# echo "source /opt/ros/{{ ros_distro }}/setup.sh" >> ~/.bashrc
- name: Configure ROS 2 environment for shells
  ansible.builtin.blockinfile:
    path: "~/.bashrc"
    block: |
      . /opt/ros/{{ ros_distro }}/setup.sh
      export ROS_DOMAIN_ID={{ ros_domain_id }}
    prepend_newline: yes
  become_user: "{{ target_user }}"
